---
###############################################################################
# Navidrome Role Options
###############################################################################
# Navidrome is a single Golang binary.
#
# Updates:
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://www.navidrome.org
# * https://www.navidrome.org/docs/usage/configuration-options

navidrome___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-14',
    _debian='trixie',
    _app='v0.61.1',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

navidrome___packages:
  - 'ca-certificates'  # Up to date certificates for certificate validation.
  - 'ffmpeg'  # Navidrome dependency not included in package (transcoding).
  - 'mpv'  # Navidrome dependency not included in package (jukebox).
  - 'xz-utils'  # ansible.builtin.apt remote deb URL.

###############################################################################
# Navidrome
###############################################################################
# User defined version is overlayed in prep.yml. Use debian package locations.
#
# Reference:
# * https://github.com/navidrome/navidrome/releases

navidrome___repo_url:
  'https://github.com/navidrome/navidrome/releases/download/'
navidrome___package: '{{
    "navidrome_" ~ navidrome___release._app.split("v")[-1] ~
    "_linux_amd64.deb"
  }}'

navidrome___app: "{{ {} | r_pufky.data.v3(

    _version=navidrome___release._app,
    _package=navidrome___package,
    _opt_d='/opt/navidrome',
    _var_d='/var/lib/navidrome',
    _cfg='/etc/navidrome/navidrome.toml',
    _drop_in='/etc/systemd/system/navidrome.service.d/override.conf',
    _base_url=navidrome___repo_url,
    _url=(
      navidrome___repo_url ~ navidrome___release._app ~ '/' ~
      navidrome___package
    ),
  ) }}"

###############################################################################
# Default Navidrome User/Group
###############################################################################

navidrome___group:
  name: 'navidrome'
  gid: 977

navidrome___user:
  name: 'navidrome'
  group: 'navidrome'
  uid: 977
  shell: '/bin/sh'
  home: '/var/lib/navidrome'
  create_home: true
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
