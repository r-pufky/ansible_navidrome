---
- name: 'Prepare'
  hosts: 127.0.0.1
  connection: local
  gather_facts: false
  tasks:
    - name: 'Prepare | import role variables'
      ansible.builtin.include_vars:
        file: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~ "/vars/main.yml"
          }}'

    - name: 'Prepare | cache'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'create_cache.yml'
      vars:
        test_name: 'Prepare cache'

    - name: '{{  "Prepare | cache | Navidrome " ~ navidrome___app._version }}'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'cache_url.yml'
      vars:
        test_name:
          '{{  "Prepare | cache | Navidrome " ~ navidrome___app._version }}'
        test_dest: '{{ navidrome___app._package }}'
        test_url: '{{ navidrome___app._url }}'
        test_mode: '0640'

- name: 'Prepare'
  hosts: 'all'
  gather_facts: false
  tasks:
    - name: 'Prepare | import role variables'
      ansible.builtin.include_vars:
        file: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~ "/vars/main.yml"
          }}'

    - name: 'Prepare | inject | cached packages'
      when: (url_inject_enable | default(false))
      ansible.builtin.copy:
        src: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~ "/molecule/cache/" ~
            navidrome___app._package
          }}'
        dest: '{{ "/tmp/" ~ navidrome___app._package }}'
        owner: 'root'
        group: 'root'
        mode: '0644'
      loop:
        - '{{ navidrome___app._package }}'

    # Base install moves applying and taking an initial backup to a 1-time
    # process rather than requiring rebuilds on re-tests. Re-running the same
    # process in converge should result in no change.
    - name: 'Prepare | role | r_pufky.media.navidrome (install base)'
      ansible.builtin.include_role:
        name: 'r_pufky.media.navidrome'

    - name: 'Prepare | role | r_pufky.media.navidrome (create db backup)'
      ansible.builtin.include_role:
        name: 'r_pufky.media.navidrome'
      vars:
        navidrome_flg_backup: true
