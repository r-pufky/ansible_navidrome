---
###############################################################################
# Restore
###############################################################################
# Test a restore operation works correctly.
#
# Tests:
# * Backup tasks is successful (DB backed up locally).
# * DB restored from backup successfully.
# * Service is validated.
# * Test only required when backup or restore is modified.

dependency:
  name: 'galaxy'
driver:
  name: 'podman'
provisioner:
  name: 'ansible'
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
    ssh_connection:
      pipelining: false
  inventory:
    group_vars:
      all:
        url_inject_enable: true
        navidrome_cfg_backup_dir: '/tmp/ansible_navidrome_test'
platforms:
  - name: 'navidrome-restore'
    image: 'ghcr.io/hifis-net/debian-systemd:13'
    systemd: 'always'
    capabilities:
      - 'SYS_ADMIN'  # Required for systemd hardening.
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:ro'
    command: '/lib/systemd/systemd'
    pre_build_image: true
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'verify'
    - 'destroy'
