---
###############################################################################
# Feature Flags
###############################################################################

# 1. Backup SQLite, navidrome.toml to navidrome_cfg_backup_d?
#
# Backup existing config, DB, and exit role. Only applies to SQLite databases
# configured in DataFolder. navidrome_cfg_backup_d created if non-existent.
# Services stopped, files backed up, services started.
#
# Default: False.
navidrome_flg_backup: false

# 2. Restore SQLite, navidrome.toml?
#
# Restore existing config, DB, and exit role.
#
# navidrome.toml:
# Configuration is applied via navidrome_cfg_file.
#
# Database (SQLite only):
# Restored from latest backup in navidrome_cfg_backup_d to
# DataFolder in restored configuration file. Custom DataFolder paths are
# **not** created. These must be created before executing restore (as with all
# custom user data directories).
#
# Services stopped, files restored, services updated and started.
#
# Default: False.
navidrome_flg_restore: false

# 3. Run maintenance tasks?
#
# Preform role maintenance tasks including removal of old role versions.
#
# Default: True.
navidrome_flg_maintenance: true

# 4. Install application?
#
# Creates required default directories, users, install packages, download
# software, set minimal navidrome.toml if not specified, update and start
# services.
#
# Default user runtime data is stored /var/lib/navidrome with default music
# location set to /opt/navidrome/music. Alternative user defined locations for
# this data must be managed outside of the role.
#
# Default: True.
navidrome_flg_install: true

# 5. Set navidrome.toml?
#
# File set using navidrome_cfg_file. Stops service and deploys user
# configuration, updates and starts services.
#
# Default: False.
navidrome_flg_config: false

###############################################################################
# Service
###############################################################################

# Navidrome release.
#
# Navidrome upgrades generally require manual upgrade steps listed in release
# notes. Submit an issue if future versions break role deployment.
#
# Default: 'v0.61.1'.
#
# Reference:
# * https://github.com/navidrome/navidrome/releases
navidrome_srv_version: 'v0.61.1'

# Github access token (navidrome).
#
# Unauthenticated (anonymous) API requests are heavily restricted to the sum
# total of requests to github from a given IP. Use an access token if
# receiving 403's.
#
# Classic Tokens:
# * settings > developer settings > personal access tokens (classic)
#   * notes: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * scopes: NONE
#
# Fine-grained Tokens:
# * settings > developer settings > personal access tokens (fine-grained)
#   * token name: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * description: {DESCRIPTIVE TEXT}
#   * resource owner: {YOUR ACCOUNT}
#   * repository access: Public Repositories (read-only)
#
# Default: '' (unauthenticated).
#
# Reference:
# * https://docs.github.com/en/authentication
navidrome_srv_token: ''

# User that Navidrome will run under.
#
# 'navidrome' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'navidrome'.
navidrome_srv_user: 'navidrome'

# Group that Navidrome will run under.
#
# 'navidrome' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'navidrome'.
navidrome_srv_group: 'navidrome'

###############################################################################
# Config
###############################################################################

# navidrome.toml to set.
#
# Ansible controller path to source navidrome.toml (treated as a jinja2
# template allowing for ansible variable interpretation). Overwrites existing
# /etc/navidrome/navidrome.toml.
#
# A minimally configured template that works with the role will be deployed if
# no config file is specified (see templates/navidrome.toml.j2):
#   DataFolder = "/var/lib/navidrome"
#   MusicFolder = "/opt/navidrome/music"
#
# Manage additional files and directories (such as DB root certificates, custom
# user data storage locations, etc.) outside of the role. Must be accessible to
# navidrome_srv_user account.
#
# navidrome_cfg_file: 'host_vars/navi.example.com/navidrome.toml'
#
# Default: '' (use minimally configured role template).
#
# Reference:
# * https://www.navidrome.org/docs/usage/configuration/options
navidrome_cfg_file: ''

# Role backup location.
#
# All backup operations for a given role execution are stored locally on
# ansible controller with the format 'YYYY-MM-DDTHHMMSS_{FILE}'.
#
# navidrome_cfg_backup_d: 'data/navi'
#
# Default: ''
navidrome_cfg_backup_d: ''
