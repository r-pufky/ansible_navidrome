---
###############################################################################
# Start
###############################################################################
# Start Navidrome services and confirm they are active and running.

- name: 'Start | navidrome.service'
  ansible.builtin.systemd:
    name: 'navidrome.service'
    enabled: true
    daemon_reload: true
    state: 'started'
  delay: 15
  retries: 3
  register: navidrome__service
  until: navidrome__service.status.ActiveState == 'active'

- name: 'Start | fact | query services'
  ansible.builtin.service_facts:

- name: 'Start | assert | services running'
  ansible.builtin.assert:
    quiet: true
    that: ansible_facts.services[item].state == 'running'
    fail_msg: |

      ✘ Service failed to start.
      {{ item }}
  loop:
    - 'navidrome.service'
